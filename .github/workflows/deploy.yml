name: Deploy Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Discover and compile LaTeX documents
        id: latex
        uses: xu-cheng/latex-action@v4
        with:
          root_file: resume/main.tex
          work_in_root_file_dir: true

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Prepare Output
        run: |
          mkdir -p public

          # Copy root web assets
          cp -r web/* public/

          # For each directory containing a compiled PDF, create a matching subpath
          for pdf in $(find . -path './.git' -prune -o -path './public' -prune -o -name 'main.pdf' -print); do
            dir="$(dirname "$pdf")"
            slug="${dir#./}"
            mkdir -p "public/$slug"
            cp "$pdf" "public/$slug/main.pdf"

            # Copy the per-directory index.html viewer if it exists
            if [ -f "$dir/index.html" ]; then
              cp "$dir/index.html" "public/$slug/index.html"
            fi
          done

          echo "--- Final site structure ---"
          find public -type f | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  cloudflare:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ vars.CLOUDFLARE_ZONE_ID != '' }}
    steps:
      - name: Purge Cloudflare Cache
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ vars.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "$body" | jq .
          if [ "$http_code" -ne 200 ]; then
            echo "::error::Cloudflare cache purge failed with HTTP $http_code"
            exit 1
          fi

      - name: Verify DNS records
        env:
          CF_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          domain="mrinmaydhar.com"
          expected="mrinmaydhar.github.io"

          echo "Checking Cloudflare DNS for $domain..."
          records=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=$domain&type=CNAME" \
            -H "Authorization: Bearer $CF_API_TOKEN")

          content=$(echo "$records" | jq -r '.result[0].content // empty')

          if [ "$content" = "$expected" ]; then
            echo "✓ DNS CNAME is correct: $domain → $content"
          else
            echo "::warning::DNS CNAME for $domain does not point to $expected (got: ${content:-<not found>}). Verify Cloudflare DNS settings."
          fi
